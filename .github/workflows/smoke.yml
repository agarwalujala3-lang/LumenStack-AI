name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Smoke and security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke analysis
        run: npm run smoke

      - name: Run security audit
        run: npm run security:audit
