<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">LumenStack AI Mark</title>
  <desc id="desc">Glowing prism symbol with circuit traces for LumenStack AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b2b"/>
      <stop offset="100%" stop-color="#0f2740"/>
    </linearGradient>
    <linearGradient id="prismLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3ffff"/>
      <stop offset="100%" stop-color="#a3f4ff"/>
    </linearGradient>
    <linearGradient id="prismMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8ffff"/>
      <stop offset="100%" stop-color="#8fd9ff"/>
    </linearGradient>
    <linearGradient id="prismRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ecbff"/>
      <stop offset="100%" stop-color="#7c68ff"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ffbff"/>
      <stop offset="100%" stop-color="#689cff"/>
    </linearGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#71f6ff" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#29cfff" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="144" height="144" rx="28" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <path d="M26 94 V48 L60 24" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M134 94 V48 L100 24" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 98 L62 126 H116" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="94" r="4.5" fill="#a9ffff"/>
    <circle cx="26" cy="48" r="4.5" fill="#a9ffff"/>
    <circle cx="60" cy="24" r="4.5" fill="#a9ffff"/>
    <circle cx="100" cy="24" r="4.5" fill="#a9ffff"/>
    <circle cx="134" cy="48" r="4.5" fill="#a9ffff"/>
    <circle cx="134" cy="94" r="4.5" fill="#a9ffff"/>
    <path d="M80 20 L108 44 V96 L80 122 L52 96 V44 Z" fill="url(#prismMid)" opacity="0.22"/>
    <path d="M80 28 L102 46 V96 L80 116 L58 96 V46 Z" fill="url(#prismMid)"/>
    <path d="M80 28 L58 46 V96 L80 116 Z" fill="url(#prismLeft)"/>
    <path d="M80 28 L102 46 V96 L80 116 Z" fill="url(#prismRight)"/>
    <path d="M80 28 L102 46 L80 59 L58 46 Z" fill="#f8ffff" opacity="0.82"/>
    <path d="M59 120 H103 L119 136 H79 Z" fill="url(#trace)" opacity="0.9"/>
    <path d="M32 101 H66" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>