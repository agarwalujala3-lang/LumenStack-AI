<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 190" role="img" aria-labelledby="title desc">
  <title id="title">LumenStack AI Lockup</title>
  <desc id="desc">LumenStack AI logo with glowing prism symbol and gradient wordmark.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b2b"/>
      <stop offset="55%" stop-color="#0d2236"/>
      <stop offset="100%" stop-color="#102842"/>
    </linearGradient>
    <linearGradient id="panelLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(107,245,255,0.0)"/>
      <stop offset="18%" stop-color="#4fe9ff"/>
      <stop offset="100%" stop-color="rgba(107,245,255,0.0)"/>
    </linearGradient>
    <linearGradient id="wordGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5ffff"/>
      <stop offset="45%" stop-color="#8af0ff"/>
      <stop offset="100%" stop-color="#6d87ff"/>
    </linearGradient>
    <linearGradient id="stackGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84f7ff"/>
      <stop offset="50%" stop-color="#62ddff"/>
      <stop offset="100%" stop-color="#6c8fff"/>
    </linearGradient>
    <linearGradient id="prismLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2ffff"/>
      <stop offset="100%" stop-color="#a3f2ff"/>
    </linearGradient>
    <linearGradient id="prismMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d7ffff"/>
      <stop offset="100%" stop-color="#8dd8ff"/>
    </linearGradient>
    <linearGradient id="prismRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98c8ff"/>
      <stop offset="100%" stop-color="#7a69ff"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8bfbff"/>
      <stop offset="100%" stop-color="#6aa0ff"/>
    </linearGradient>
    <filter id="cyanGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#72f4ff" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2dcfff" flood-opacity="0.4"/>
    </filter>
    <filter id="textGlowFilter" x="-20%" y="-150%" width="150%" height="400%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#54dfff" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="6" y="20" width="848" height="148" rx="28" fill="url(#panelBg)"/>
  <path d="M32 34 H406" stroke="url(#panelLine)" stroke-width="2" opacity="0.5"/>
  <path d="M26 85 H420" stroke="url(#panelLine)" stroke-width="2" opacity="0.4"/>
  <g transform="translate(26 24) scale(0.86)" filter="url(#cyanGlow)">
    <path d="M24 106 L24 44 L66 18" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M136 106 L136 44 L94 18" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M28 108 L70 142 H126" fill="none" stroke="url(#trace)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="106" r="4.5" fill="#a8ffff"/>
    <circle cx="24" cy="44" r="4.5" fill="#a8ffff"/>
    <circle cx="66" cy="18" r="4.5" fill="#a8ffff"/>
    <circle cx="94" cy="18" r="4.5" fill="#a8ffff"/>
    <circle cx="136" cy="44" r="4.5" fill="#a8ffff"/>
    <circle cx="136" cy="106" r="4.5" fill="#a8ffff"/>
    <path d="M80 10 L112 36 V98 L80 124 L48 98 V36 Z" fill="url(#prismMid)" opacity="0.22"/>
    <path d="M80 18 L104 40 V98 L80 120 L56 98 V40 Z" fill="url(#prismMid)"/>
    <path d="M80 18 L56 40 V98 L80 120 Z" fill="url(#prismLeft)"/>
    <path d="M80 18 L104 40 V98 L80 120 Z" fill="url(#prismRight)"/>
    <path d="M80 18 L104 40 L80 55 L56 40 Z" fill="#f7ffff" opacity="0.82"/>
    <path d="M58 123 H103 L124 144 H79 Z" fill="url(#trace)" opacity="0.88"/>
    <path d="M26 114 L64 114" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g filter="url(#textGlowFilter)" font-family="Bahnschrift, 'Segoe UI Variable', 'Segoe UI', Arial, sans-serif" font-size="74" font-weight="500" letter-spacing="5">
    <text x="246" y="112" fill="#fbffff">Lumen</text>
    <text x="501" y="112" fill="url(#stackGlow)">Stack</text>
    <text x="722" y="112" fill="url(#wordGlow)">AI</text>
  </g>
</svg>