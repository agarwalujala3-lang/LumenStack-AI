<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lumina Quantum 3D Logo</title>
  <desc id="desc">A futuristic 3D style logo with glowing rings, prism core, and cinematic gradients.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1E46"/>
      <stop offset="55%" stop-color="#102B63"/>
      <stop offset="100%" stop-color="#06142F"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CA9FF"/>
      <stop offset="45%" stop-color="#6CF4E3"/>
      <stop offset="100%" stop-color="#B89BFF"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="25%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFE49A"/>
      <stop offset="45%" stop-color="#FFC680"/>
      <stop offset="100%" stop-color="#FF8FC6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="122" fill="url(#bgGrad)"/>

  <ellipse cx="256" cy="256" rx="168" ry="168" fill="none" stroke="url(#ringGrad)" stroke-width="20" opacity="0.85" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="132" ry="132" fill="none" stroke="#9CEBFF" stroke-opacity="0.6" stroke-width="8"/>
  <ellipse cx="256" cy="256" rx="96" ry="96" fill="none" stroke="#7CA9FF" stroke-opacity="0.5" stroke-width="6"/>

  <path d="M256 126 L346 196 L346 316 L256 386 L166 316 L166 196 Z" fill="url(#coreGrad)" filter="url(#glow)"/>
  <path d="M256 146 L330 203 L330 308 L256 366 L182 308 L182 203 Z" fill="#1F2C5E" opacity="0.55"/>
  <path d="M256 168 L312 210 L312 302 L256 344 L200 302 L200 210 Z" fill="#6CF4E3" opacity="0.22"/>

  <circle cx="256" cy="256" r="20" fill="#E6FBFF"/>
  <circle cx="256" cy="256" r="35" fill="#C8F4FF" opacity="0.26" filter="url(#soft)"/>

  <path d="M126 278 C164 224, 194 206, 256 190" stroke="#6CF4E3" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M386 234 C348 286, 316 306, 256 322" stroke="#B89BFF" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75"/>

  <circle cx="126" cy="278" r="8" fill="#6CF4E3"/>
  <circle cx="386" cy="234" r="8" fill="#B89BFF"/>
</svg>
