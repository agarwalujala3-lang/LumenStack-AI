  <g transform="translate(94 342)">
    <rect width="226" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.09" stroke="#A7F3FF" stroke-opacity="0.14"/>
    <text x="22" y="27" fill="#DDF8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900">Quality Gate: smoke + security</text>
    <rect x="246" width="238" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.09" stroke="#A7F3FF" stroke-opacity="0.14"/>
    <text x="268" y="27" fill="#DDF8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900">Governance: templates + Dependabot</text>
    <rect x="504" width="222" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.09" stroke="#A7F3FF" stroke-opacity="0.14"/>
    <text x="526" y="27" fill="#DDF8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900">Security: hardened headers</text>
  </g>
