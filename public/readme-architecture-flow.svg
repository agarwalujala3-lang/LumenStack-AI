      <circle cx="76" cy="52" r="25" fill="#8B7CFF" fill-opacity="0.18" stroke="#AFA7FF"/>
      <text x="57" y="59" fill="#DDD8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">04</text>
      <text x="43" y="102" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900">Chat</text>
      <text x="24" y="126" fill="#BDEFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Ask the repo</text>
    </g>

    <g transform="translate(880 0)">
      <rect width="152" height="148" rx="22" fill="#FFFFFF" fill-opacity="0.10" stroke="#A7F3FF" stroke-opacity="0.18"/>
      <circle cx="76" cy="52" r="25" fill="#3EE6B4" fill-opacity="0.18" stroke="#3EE6B4"/>
      <text x="57" y="59" fill="#9FFFE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">05</text>
      <text x="39" y="102" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900">Export</text>
      <text x="26" y="126" fill="#BDEFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Briefs + JSON</text>
