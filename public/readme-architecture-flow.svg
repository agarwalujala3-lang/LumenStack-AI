      <circle cx="76" cy="52" r="25" fill="#FFB84D" fill-opacity="0.17" stroke="#FFB84D"/>
      <text x="57" y="59" fill="#FFE0A3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">03</text>
      <text x="24" y="102" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900">Visualize</text>
      <text x="26" y="126" fill="#BDEFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Mermaid maps</text>
