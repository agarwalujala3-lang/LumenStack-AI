<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lessons | Lumina Learn AI</title>
    <link rel="stylesheet" href="/css/site.css" />
  </head>
  <body>
    <canvas id="nebula-canvas" class="nebula-canvas"></canvas>
    <div class="bg-grid"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="page-shell">
      <header class="main-nav">
        <div class="brand-line">
          <span class="brand-emblem">
            <img src="/assets/lumina-quantum-logo.svg" alt="Lumina quantum logo" />
          </span>
          <div class="brand-text">
            <strong>Lumina Learn AI</strong>
            <small>Animated lessons</small>
          </div>
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="/dashboard.html">Dashboard</a>
          <a class="nav-link active" href="/lesson.html">Lessons</a>
          <a class="nav-link" href="/visuals.html">Visuals</a>
          <a class="nav-link" href="/notes.html">Notes</a>
          <button class="nav-link" type="button" data-logout>Logout</button>
        </nav>
      </header>

      <section class="workspace-layout">
        <aside class="side-rail">
          <article class="sidebar-card">
            <div class="kicker">Lesson Controls</div>
            <div id="flash-root"></div>
            <div class="action-row">
              <button id="autoplay-btn" class="btn" type="button">Auto-play Chapters</button>
              <button id="save-btn" class="btn secondary" type="button">Save Lesson</button>
            </div>
            <div id="chapter-root" class="side-nav"></div>
          </article>
        </aside>

        <div id="lesson-root" class="content-column"></div>
      </section>
    </div>

    <script type="module" src="/js/lesson.js"></script>
  </body>
</html>
