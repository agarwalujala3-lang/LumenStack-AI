<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Lumina Learn AI</title>
    <link rel="stylesheet" href="/css/site.css" />
  </head>
  <body>
    <canvas id="nebula-canvas" class="nebula-canvas"></canvas>
    <div class="bg-grid"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="page-shell">
      <header class="main-nav">
        <div class="brand-line">
          <span class="brand-emblem">
            <img src="/assets/lumina-quantum-logo.svg" alt="Lumina quantum logo" />
          </span>
          <div class="brand-text">
            <strong>Lumina Learn AI</strong>
            <small>Create account</small>
          </div>
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="/index.html">Home</a>
          <a class="nav-link" href="/login.html">Login</a>
          <a class="nav-link active" href="/signup.html">Sign Up</a>
        </nav>
      </header>

      <section class="cards-grid two">
        <article class="panel stack" data-reveal>
          <div class="kicker">Email Signup</div>
          <h2>Create your account</h2>
          <p>Only basic details required. You can start learning immediately.</p>
          <div id="flash-root"></div>
          <form id="signup-form" class="form-grid">
            <label class="field">
              <span>Name</span>
              <input name="name" type="text" autocomplete="name" required />
            </label>
            <label class="field">
              <span>Email</span>
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input name="password" type="password" autocomplete="new-password" required />
            </label>
            <button class="btn primary" type="submit">Create Account</button>
          </form>
        </article>

        <article class="panel stack" id="phone-lane" data-reveal>
          <div class="kicker">Phone OTP Login</div>
          <h3>Use phone number</h3>
          <p>Request OTP code, then verify and login.</p>
          <form id="phone-request-form" class="form-grid">
            <label class="field">
              <span>Phone Number</span>
              <input name="phone" type="tel" placeholder="+9198XXXXXXXX" required />
            </label>
            <label class="field">
              <span>Name (optional)</span>
              <input name="name" type="text" />
            </label>
            <button class="btn" type="submit">Send OTP</button>
          </form>

          <div id="phone-verify-block" class="hidden">
            <p id="code-hint"></p>
            <form id="phone-verify-form" class="form-grid">
              <label class="field">
                <span>OTP Code</span>
                <input name="code" type="text" required />
              </label>
              <button class="btn secondary" type="submit">Verify OTP</button>
            </form>
          </div>
        </article>
      </section>
    </div>

    <script type="module" src="/js/signup.js"></script>
  </body>
</html>
