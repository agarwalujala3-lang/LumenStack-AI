    <rect x="0" y="0" width="476" height="384" rx="26" fill="#081A2A" fill-opacity="0.82" stroke="#9FF5FF" stroke-opacity="0.22" filter="url(#softShadow)"/>
    <rect x="24" y="24" width="428" height="58" rx="16" fill="#FFFFFF" fill-opacity="0.08"/>
