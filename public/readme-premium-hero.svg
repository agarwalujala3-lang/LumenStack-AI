      <text x="57" y="87" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="900">94</text>
      <text x="28" y="158" fill="#BDEFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">review readiness</text>
