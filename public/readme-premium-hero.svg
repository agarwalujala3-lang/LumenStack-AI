    <text x="47" y="327" fill="#9FFFE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900">Smoke tested</text>
    <rect x="166" y="305" width="132" height="34" rx="17" fill="#5BE8FF" fill-opacity="0.15" stroke="#5BE8FF" stroke-opacity="0.38"/>
    <text x="186" y="327" fill="#C9F8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900">Security audit</text>
  </g>

