    </g>

    <g transform="translate(214 112)">
      <rect width="226" height="126" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#A7F3FF" stroke-opacity="0.12"/>
      <text x="20" y="32" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="900">Signal growth</text>
      <rect x="22" y="80" width="18" height="24" rx="7" fill="#44D7FF"/>
      <rect x="54" y="63" width="18" height="41" rx="7" fill="#4EE4E4"/>
      <rect x="86" y="70" width="18" height="34" rx="7" fill="#3EE6B4"/>
      <rect x="118" y="48" width="18" height="56" rx="7" fill="#79E8A0"/>
