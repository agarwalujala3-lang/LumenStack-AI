<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LumenStack AI premium README hero</title>
  <desc id="desc">A cinematic dashboard preview for an AI architecture intelligence workspace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="0.45" stop-color="#09253A"/>
      <stop offset="1" stop-color="#071827"/>
    </linearGradient>
    <radialGradient id="aqua" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(952 129) rotate(132) scale(581 351)">
      <stop stop-color="#5BE8FF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#5BE8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(265 574) rotate(-33) scale(486 278)">
      <stop stop-color="#8B7CFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8B7CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="142" y1="112" x2="1057" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B9F4FF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4FE7FF"/>
      <stop offset="0.58" stop-color="#3EE6B4"/>
      <stop offset="1" stop-color="#FFB84D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="680" rx="34" fill="url(#aqua)"/>
  <rect width="1200" height="680" rx="34" fill="url(#violet)"/>

  <g opacity="0.32">
    <path d="M78 128H1124" stroke="#7CEAFF" stroke-opacity="0.16"/>
    <path d="M78 216H1124" stroke="#7CEAFF" stroke-opacity="0.10"/>
    <path d="M78 304H1124" stroke="#7CEAFF" stroke-opacity="0.10"/>
    <path d="M78 392H1124" stroke="#7CEAFF" stroke-opacity="0.10"/>
    <path d="M78 480H1124" stroke="#7CEAFF" stroke-opacity="0.10"/>
    <path d="M170 68V615" stroke="#7CEAFF" stroke-opacity="0.08"/>
