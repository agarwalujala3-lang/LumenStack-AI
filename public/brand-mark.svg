<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">LumenStack AI Prism Mark</title>
  <desc id="desc">A glowing stacked prism emblem built from three glass panels and a luminous core.</desc>
  <defs>
    <linearGradient id="stackEdge" x1="28" y1="30" x2="132" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9FDFF"/>
      <stop offset="0.38" stop-color="#77F0FF"/>
      <stop offset="1" stop-color="#6488FF"/>
    </linearGradient>
    <linearGradient id="stackGlass" x1="42" y1="40" x2="122" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18354A" stop-opacity="0.86"/>
      <stop offset="0.52" stop-color="#102739" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0A1826" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="stackCore" x1="58" y1="42" x2="101" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FFFF"/>
      <stop offset="0.46" stop-color="#8BF4FF"/>
      <stop offset="1" stop-color="#5B7DFF"/>
    </linearGradient>
    <radialGradient id="stackAura" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6AE9FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6AE9FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="stackGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#6DEEFF" flood-opacity="0.58"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#5A84FF" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#stackGlow)">
    <ellipse cx="78" cy="82" rx="54" ry="42" fill="url(#stackAura)"/>

    <path d="M37 47L91 47L122 70L68 70Z" fill="url(#stackGlass)" stroke="url(#stackEdge)" stroke-width="3.2" stroke-linejoin="round" opacity="0.78"/>
    <path d="M28 76L82 76L113 99L59 99Z" fill="url(#stackGlass)" stroke="url(#stackEdge)" stroke-width="3.2" stroke-linejoin="round" opacity="0.9"/>
    <path d="M39 105L93 105L124 128L70 128Z" fill="url(#stackGlass)" stroke="url(#stackEdge)" stroke-width="3.2" stroke-linejoin="round"/>

    <path d="M71 36L95 52V112L71 128L47 112V52Z" fill="url(#stackCore)" opacity="0.92"/>
    <path d="M78 49L90 57V107L78 115L66 107V57Z" fill="#EEFDFE" opacity="0.86"/>

    <path d="M95 52L114 63" stroke="#B5FAFF" stroke-width="3.2" stroke-linecap="round" opacity="0.76"/>
    <path d="M95 112L114 123" stroke="#87E9FF" stroke-width="3.2" stroke-linecap="round" opacity="0.62"/>
    <path d="M47 52L28 63" stroke="#8AEFFF" stroke-width="3.2" stroke-linecap="round" opacity="0.46"/>

    <circle cx="117" cy="66" r="4.4" fill="#C9FDFF"/>
    <circle cx="120" cy="121" r="4.2" fill="#87E9FF"/>
    <circle cx="31" cy="63" r="3.8" fill="#8DE8FF" opacity="0.74"/>
  </g>
</svg>
