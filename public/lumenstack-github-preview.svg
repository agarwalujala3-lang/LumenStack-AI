    </linearGradient>
    <filter id="panelGlow" x="986" y="164" width="540" height="456" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#6DE8FF" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#091220" flood-opacity="0.45"/>
    </filter>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
