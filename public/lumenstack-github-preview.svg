    </radialGradient>
    <radialGradient id="smokeB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1330 720) rotate(150) scale(420 260)">
      <stop stop-color="#7D8FFF" stop-opacity="0.18"/>
